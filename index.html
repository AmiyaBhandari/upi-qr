<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHRI SIDDHACHAL AUTO PARTS - Billing</title>
    <!-- Stable QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #0a0a0a;
            --border-color: #1c1c1e;
            --text-color: #ffffff;
            --text-muted: #8e8e93;
            --accent-color: #34c759; /* Classic Success Green */
            --error-color: #ff3b30;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        .billing-container {
            width: 100%;
            max-width: 440px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 30px 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
            text-align: center;
            box-sizing: border-box;
        }

        .header h1 {
            margin: 0 0 6px 0;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        .vpa-badge {
            display: inline-block;
            background: #1c1c1e;
            color: var(--text-muted);
            font-family: monospace;
            font-size: 13px;
            padding: 4px 12px;
            border-radius: 100px;
            margin-bottom: 24px;
            border: 1px solid #2c2c2e;
        }

        /* Error Notification Toast */
        .toast {
            background: rgba(255, 59, 48, 0.15);
            border: 1px solid var(--error-color);
            color: #ff453a;
            padding: 10px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
            align-items: center;
            justify-content: center;
            animation: slideDown 0.2s ease-out;
        }

        @keyframes slideDown {
            from { transform: translateY(-10px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .currency-symbol {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 32px;
            font-weight: 700;
            color: var(--text-muted);
            user-select: none;
        }

        input[type="number"] {
            width: 100%;
            padding: 18px 20px 18px 55px;
            background: #121212;
            border: 2px solid var(--border-color);
            border-radius: 14px;
            color: var(--text-color);
            box-sizing: border-box;
            font-size: 36px;
            font-weight: 700;
            outline: none;
            transition: all 0.2s ease;
            -moz-appearance: textfield; /* Hides Firefox counter spinners */
        }

        /* Hides Webkit (Chrome/Safari) counter spinners */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type="number"]:focus {
            border-color: #ffffff;
            background: #181818;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.05);
        }

        .action-btn {
            width: 100%;
            padding: 16px;
            background: var(--text-color);
            color: #000000;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.1s ease, background-color 0.2s ease;
            margin-bottom: 12px;
        }

        .action-btn:hover {
            background-color: #e5e5ea;
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        #display-zone {
            margin-top: 24px;
            display: none;
            flex-direction: column;
            align-items: center;
            animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes popIn {
            from { transform: scale(0.92); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .qr-card {
            background: #ffffff;
            padding: 16px;
            border-radius: 16px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: inline-block;
            position: relative;
        }

        .qr-card:hover {
            transform: scale(1.03);
            box-shadow: 0 12px 30px rgba(255,255,255,0.1);
        }

        .qr-tap-hint {
            margin-top: 8px;
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Optimized Grid for Action Buttons */
        .qr-actions {
            width: 100%;
            margin-top: 20px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .qr-actions-row {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .btn-primary-action {
            width: 100%;
            padding: 14px;
            background: var(--accent-color);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary-action:hover {
            background: #2fb34f;
        }

        .btn-secondary {
            flex: 1;
            padding: 12px;
            background: #1c1c1e;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-secondary:hover {
            background: #2c2c2e;
            border-color: #3a3a3c;
        }

        /* IMMERSIVE FULLSCREEN OVERLAY */
        #fullscreen-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(10px);
            cursor: pointer;
        }

        .fullscreen-content {
            background: #ffffff;
            padding: 24px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
            transform: scale(0.9);
            animation: zoomIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes zoomIn {
            to { transform: scale(1); }
        }

        .fullscreen-title {
            color: #000000;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .fullscreen-subtitle {
            color: #777;
            font-size: 13px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .fullscreen-hint {
            color: #8e8e93;
            font-size: 12px;
            margin-top: 16px;
        }
    </style>
</head>
<body>

<div class="billing-container">
    <div class="header">
        <h1>Siddhachal Auto Parts</h1>
        <div class="vpa-badge">pranay.jain95@axl</div>
    </div>

    <!-- Error Toast Notification -->
    <div id="toast" class="toast">Please enter a valid amount.</div>

    <!-- Wrap in form to naturally handle desktop/laptop keyboard submission (Enter key) -->
    <form id="billingForm" onsubmit="event.preventDefault(); handleGeneration();">
        <div class="input-wrapper">
            <span class="currency-symbol">₹</span>
            <input 
                type="number" 
                id="billAmount" 
                placeholder="0.00" 
                step="any" 
                inputmode="decimal" 
                autofocus
            >
        </div>
        <button type="submit" class="action-btn">Generate QR Code</button>
    </form>

    <div id="display-zone">
        <div class="qr-card" onclick="openFullscreen()" title="Tap to expand fullscreen">
            <div id="qrcode"></div>
        </div>
        <div class="qr-tap-hint">Tap QR to Expand Fullscreen</div>

        <div class="qr-actions">
            <!-- Row 1: Primary Action (Direct Native Share) -->
            <button class="btn-primary-action" onclick="shareQRDirectly()">
                <!-- Minimalist Share Icon SVG -->
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                Share QR Code
            </button>
            
            <!-- Row 2: Secondary Options -->
            <div class="qr-actions-row">
                <button class="btn-secondary" onclick="saveWithPadding()">Save Image</button>
                <button class="btn-secondary" onclick="resetForm()">Clear</button>
            </div>
        </div>
    </div>
</div>

<!-- IMMERSIVE FULLSCREEN OVERLAY -->
<div id="fullscreen-overlay" onclick="closeFullscreen()">
    <div class="fullscreen-content" onclick="event.stopPropagation()">
        <div class="fullscreen-title">SHRI SIDDHACHAL AUTO PARTS</div>
        <div class="fullscreen-subtitle" id="fullscreen-amount">Amount: ₹0.00</div>
        
        <!-- Target container for high resolution fullscreen QR -->
        <div id="fullscreen-qrcode"></div>
        
        <div class="fullscreen-hint">Tap anywhere to return</div>
    </div>
</div>

<script>
    // Permanently fixed shop parameters
    const UPI_TARGET = "pranay.jain95@axl";
    const PAYEE_NAME = "SHRI%20SIDDHACHAL%20AUTO%20PARTS";

    // Track state
    let activeAmount = "0.00";

    // Ensure the input is instantly focused when the window loads
    window.addEventListener('DOMContentLoaded', () => {
        const inputField = document.getElementById('billAmount');
        inputField.focus();
        
        // Auto-select text on click to make over-typing super fast
        inputField.addEventListener('click', () => {
            inputField.select();
        });
    });

    // Handle globally pressed Escape key to clear or close fullscreen
    document.addEventListener('keydown', (e) => {
        if (e.key === "Escape") {
            const overlay = document.getElementById('fullscreen-overlay');
            if (overlay.style.display === "flex") {
                closeFullscreen();
            } else {
                resetForm();
            }
        }
    });

    // Custom inline toast error display
    function showToast(message, isSuccess = false) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        if (isSuccess) {
            toast.style.background = "rgba(52, 199, 89, 0.15)";
            toast.style.borderColor = "var(--accent-color)";
            toast.style.color = "#30d158";
        } else {
            toast.style.background = "rgba(255, 59, 48, 0.15)";
            toast.style.borderColor = "var(--error-color)";
            toast.style.color = "#ff453a";
        }
        toast.style.display = 'flex';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 4000);
    }

    function handleGeneration() {
        const amtInput = document.getElementById('billAmount').value.trim();
        const displayZone = document.getElementById('display-zone');
        const qrcodeDiv = document.getElementById('qrcode');

        if (!amtInput || parseFloat(amtInput) <= 0) {
            showToast('Please enter an amount greater than 0.');
            return;
        }

        activeAmount = parseFloat(amtInput).toFixed(2);
        
        // Clear previous container contents
        qrcodeDiv.innerHTML = "";
        displayZone.style.display = "flex";

        // Build official URI protocol deep link
        const upiUri = `upi://pay?pa=${UPI_TARGET}&pn=${PAYEE_NAME}&am=${activeAmount}&cu=INR`;

        // Generate the standard preview QR
        new QRCode(qrcodeDiv, {
            text: upiUri,
            width: 220,
            height: 220,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        // Scroll smooth so view is perfect on small screens
        displayZone.scrollIntoView({ behavior: 'smooth' });
    }

    function openFullscreen() {
        const overlay = document.getElementById('fullscreen-overlay');
        const fsQrDiv = document.getElementById('fullscreen-qrcode');
        const fsAmountLabel = document.getElementById('fullscreen-amount');

        overlay.style.display = "flex";
        fsAmountLabel.textContent = `Amount: ₹${activeAmount}`;
        fsQrDiv.innerHTML = "";

        const upiUri = `upi://pay?pa=${UPI_TARGET}&pn=${PAYEE_NAME}&am=${activeAmount}&cu=INR`;

        // Calculate maximum safe sizing for viewport
        const sideSize = Math.min(window.innerWidth * 0.7, window.innerHeight * 0.5, 360);

        // Generate a large high-resolution copy inside fullscreen modal
        new QRCode(fsQrDiv, {
            text: upiUri,
            width: Math.floor(sideSize),
            height: Math.floor(sideSize),
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    }

    function closeFullscreen() {
        document.getElementById('fullscreen-overlay').style.display = "none";
    }

    // Helper to generate the exact card design requested in image_617903.png
    function generatePaddedCanvas() {
        const originalCanvas = document.querySelector('#qrcode canvas');
        if (!originalCanvas) return null;

        // Perfect card layout proportions (aspect ratio matching image_617903.png)
        const canvasWidth = 420;
        const canvasHeight = 520;
        const cardRadius = 24;

        const customCanvas = document.createElement('canvas');
        const ctx = customCanvas.getContext('2d');

        customCanvas.width = canvasWidth;
        customCanvas.height = canvasHeight;

        // 1. Fill base backdrop with dark grey matching standard container boundaries
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvasWidth, canvasHeight);

        // 2. Draw the rounded white card container
        ctx.beginPath();
        ctx.moveTo(10 + cardRadius, 10);
        ctx.lineTo(10 + 400 - cardRadius, 10);
        ctx.quadraticCurveTo(10 + 400, 10, 10 + 400, 10 + cardRadius);
        ctx.lineTo(10 + 400, 10 + 500 - cardRadius);
        ctx.quadraticCurveTo(10 + 400, 10 + 500, 10 + 400 - cardRadius, 10 + 500);
        ctx.lineTo(10 + cardRadius, 10 + 500);
        ctx.quadraticCurveTo(10, 10 + 500, 10, 10 + 500 - cardRadius);
        ctx.lineTo(10, 10 + cardRadius);
        ctx.quadraticCurveTo(10, 10, 10 + cardRadius, 10);
        ctx.closePath();
        
        ctx.fillStyle = "#ffffff";
        ctx.fill();

        // Optional: Draw a subtle, neat border line around the card to preserve visibility on pure white backgrounds
        ctx.strokeStyle = "#e5e5ea";
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // 3. Draw Header Title ("SHRI SIDDHACHAL AUTO PARTS")
        ctx.textAlign = "center";
        ctx.fillStyle = "#000000";
        ctx.font = 'bold 20px -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif';
        ctx.fillText("SHRI SIDDHACHAL AUTO PARTS", 210, 65);

        // 4. Draw Subheader Amount ("Amount: ₹[activeAmount]")
        ctx.fillStyle = "#71717a";
        ctx.font = '500 14px -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif';
        ctx.fillText(`Amount: ₹${activeAmount}`, 210, 100);

        // 5. Centered draw original QR canvas block (260x260 pixels)
        const qrSize = 260;
        const qrX = (canvasWidth - qrSize) / 2; // 80
        const qrY = 135;
        ctx.drawImage(originalCanvas, qrX, qrY, qrSize, qrSize);

        // 6. Draw Footer Text ("Tap anywhere to return") exactly like image_617903.png
        ctx.fillStyle = "#a1a1aa";
        ctx.font = '400 12px -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif';
        ctx.fillText("Tap anywhere to return", 210, 450);

        return customCanvas;
    }

    // Save with the exact compiled template card design
    function saveWithPadding() {
        const paddedCanvas = generatePaddedCanvas();
        if (!paddedCanvas) {
            showToast("Generate a QR code first!");
            return;
        }

        try {
            const hook = document.createElement('a');
            hook.href = paddedCanvas.toDataURL("image/png");
            hook.download = `Siddhachal_AutoParts_${activeAmount}.png`;
            hook.click();
        } catch (e) {
            showToast("Failed to save image. Try taking a screenshot.");
        }
    }

    // Direct system sharing with identical card template layout
    function shareQRDirectly() {
        const paddedCanvas = generatePaddedCanvas();
        if (!paddedCanvas) {
            showToast("Generate a QR code first!");
            return;
        }

        // Web Share API File Check
        if (navigator.canShare && navigator.share) {
            try {
                paddedCanvas.toBlob(async (blob) => {
                    if (!blob) {
                        showToast("Failed to compile image for sharing.");
                        return;
                    }

                    const fileName = `Siddhachal_AutoParts_${activeAmount}.png`;
                    const file = new File([blob], fileName, { type: 'image/png' });

                    if (navigator.canShare({ files: [file] })) {
                        await navigator.share({
                            files: [file],
                            title: 'SHRI SIDDHACHAL AUTO PARTS',
                            text: `UPI payment invoice of ₹${activeAmount} generated dynamically.`
                        });
                    } else {
                        // Fallback: Try sharing payment link if files are blocked
                        const upiUri = `upi://pay?pa=${UPI_TARGET}&pn=${PAYEE_NAME}&am=${activeAmount}&cu=INR`;
                        await navigator.share({
                            title: 'SHRI SIDDHACHAL AUTO PARTS',
                            text: `Pay ₹${activeAmount} using this link: ${upiUri}`
                        });
                    }
                }, 'image/png');
            } catch (err) {
                showToast("System sharing was cancelled or failed.");
            }
        } else {
            // Friendly fallback if browser does not support Web Share API
            showToast("Your device browser doesn't support direct sharing. Use 'Save Image' instead.");
        }
    }

    function resetForm() {
        document.getElementById('billAmount').value = "";
        document.getElementById('display-zone').style.display = "none";
        document.getElementById('qrcode').innerHTML = "";
        document.getElementById('billAmount').focus();
    }
</script>

</body>
</html>
